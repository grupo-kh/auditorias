# =============================================================================
# nginx-auditorias.conf
# Proxy inverso nginx -> aplicación Flask "Auditorías KH" en 127.0.0.1:8000
#
# Sustituir <SERVER_IP> por la IP o nombre del servidor antes de usar.
# Incluir este bloque server { } dentro del bloque http { } de nginx.conf,
# o guardarlo en sites-available/ e incluirlo desde nginx.conf.
#
# REQUISITO PREVIO: la app Flask debe estar corriendo en 127.0.0.1:8000
# (python app.py con APP_HOST/APP_PORT configurados en el .env).
# =============================================================================

# Upstream: aplicación Flask
upstream auditorias_backend {
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen      <SERVER_IP>:80;
    server_name <SERVER_IP>;

    # ---- Raíz: la propia app sirve el panel en / --------------------------
    # (la app redirige a /login si no hay sesión)

    # ---- Límites y timeouts ------------------------------------------------
    client_max_body_size        50m;
    client_body_buffer_size     128k;
    client_body_timeout         120s;
    client_header_timeout       60s;
    send_timeout                120s;

    # ---- Logs --------------------------------------------------------------
    access_log  logs/auditorias.access.log;
    error_log   logs/auditorias.error.log warn;

    # ---- Compresión --------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_types        text/plain text/css text/javascript
                      application/javascript application/json
                      application/xml image/svg+xml;

    # ---- Bloqueos de seguridad básicos -------------------------------------
    # Negar acceso directo a la base SQLite y archivos sensibles
    location ~* \.(db|sqlite|sqlite3|sql|log|ini|env|bak|swp)$ {
        deny all;
        return 404;
    }

    # Negar acceso a archivos ocultos (.git, .env, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    # Bloquear rutas de herramientas internas heredadas
    location ~* ^/(dashboard|phpmyadmin|webalizer|server-status|server-info)(/|$) {
        deny all;
        return 404;
    }

    # ---- Estáticos con caché (los sirve la app; nginx solo cachea) ---------
    location /static/ {
        proxy_pass              http://auditorias_backend;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        Connection        "";
        access_log              off;
        expires                 7d;
        add_header              Cache-Control "public, max-age=604800";
    }

    # ---- Proxy a la app Flask para el resto de rutas -----------------------
    location / {
        proxy_pass              http://auditorias_backend;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        X-Forwarded-Host  $host;
        proxy_set_header        Connection        "";

        proxy_connect_timeout   30s;
        proxy_send_timeout      300s;
        proxy_read_timeout      300s;
        proxy_buffering         on;
        proxy_buffers           16 16k;
        proxy_busy_buffers_size 32k;
        proxy_redirect          off;
    }
}
